name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run build -w packages/shared
      - run: npm run build -w packages/indexer
      - run: npm run build -w packages/control
      - name: Unit Tests
        run: npm run test:unit -w packages/control
      - name: Integration Tests
        run: npm run test:integration -w packages/control
