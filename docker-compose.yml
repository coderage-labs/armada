
services:
  control:
    build:
      context: .
      dockerfile: docker/Dockerfile.control
    container_name: armada-control
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - ARMADA_API_URL=${ARMADA_API_URL:-http://armada-control:3001}
      - ARMADA_AVATAR_MODEL=${ARMADA_AVATAR_MODEL:-openai/dall-e-3}
      - ARMADA_DEFAULT_NODE_URL=http://armada-node:8080
      - ARMADA_DEFAULT_NODE_TOKEN=${ARMADA_NODE_TOKEN:-}
      - ARMADA_DB_PATH=/data/armada.db
      - ARMADA_PLUGINS_PATH=/data/plugins
      # ARMADA_PUBLIC_URL=https://armada.example.com
    volumes:
      - armada-data:/data
      - armada-plugins:/data/plugins
    networks:
      - armada
    restart: unless-stopped

  node:
    build:
      context: .
      dockerfile: docker/Dockerfile.node
    container_name: armada-node
    ports:
      - "8080:8080"
    environment:
      - ARMADA_NODE_TOKEN=${ARMADA_NODE_TOKEN:-}
      - ARMADA_CONTROL_URL=ws://armada-control:3001/api/nodes/ws
      - HOST_DATA_DIR=/opt/armada-data
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/armada-data:/data
      - /opt/armada-data/node-credentials:/etc/armada-node
      - armada-plugins:/data/armada/plugins:ro
    networks:
      - armada
      - armada-net
    restart: unless-stopped

volumes:
  armada-data:
  armada-plugins:

networks:
  armada:
    driver: bridge
  armada-net:
    name: armada-net
    external: true
