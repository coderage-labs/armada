<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Armada</title>
    <style>
      /* ── Pre-React splash loader ── */
      #splash{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(135deg,#09090b 0%,#18181b 100%);z-index:9999;transition:opacity .4s ease-out}
      #splash.fade{opacity:0;pointer-events:none}
      #splash .rocket-wrap{position:relative;width:48px;height:48px;animation:float 2s ease-in-out infinite}
      #splash .rocket{font-size:36px;filter:drop-shadow(0 0 12px rgba(139,92,246,.5));transform:rotate(-45deg);display:block;text-align:center;line-height:48px}
      #splash .exhaust{position:absolute;bottom:-6px;left:50%;width:4px;height:18px;transform:translateX(-50%) rotate(-45deg);transform-origin:top center;border-radius:2px;background:linear-gradient(to bottom,#8b5cf6,#6d28d9 40%,transparent);animation:exhaust 0.6s ease-in-out infinite alternate;opacity:.8}
      #splash .exhaust:nth-child(3){animation-delay:.15s;left:calc(50% - 5px);height:12px;opacity:.5}
      #splash .exhaust:nth-child(4){animation-delay:.3s;left:calc(50% + 5px);height:10px;opacity:.4}
      #splash .stars{position:absolute;inset:0;overflow:hidden;pointer-events:none}
      #splash .star{position:absolute;width:2px;height:2px;background:#a78bfa;border-radius:50%;animation:twinkle 2s ease-in-out infinite}
      #splash .label{margin-top:28px;font-family:system-ui,-apple-system,sans-serif;font-size:13px;font-weight:500;color:#71717a;letter-spacing:.04em}
      @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
      @keyframes exhaust{from{height:14px;opacity:.7}to{height:22px;opacity:.3}}
      @keyframes twinkle{0%,100%{opacity:.2}50%{opacity:.8}}
    </style>
  </head>
  <body class="bg-gray-950 text-gray-100">
    <div id="splash">
      <div class="stars">
        <div class="star" style="top:15%;left:20%;animation-delay:0s"></div>
        <div class="star" style="top:30%;left:70%;animation-delay:.4s"></div>
        <div class="star" style="top:60%;left:15%;animation-delay:.8s"></div>
        <div class="star" style="top:45%;left:85%;animation-delay:1.2s"></div>
        <div class="star" style="top:80%;left:40%;animation-delay:.6s"></div>
        <div class="star" style="top:10%;left:55%;animation-delay:1.4s"></div>
        <div class="star" style="top:70%;left:75%;animation-delay:.2s"></div>
        <div class="star" style="top:25%;left:35%;animation-delay:1s"></div>
      </div>
      <div class="rocket-wrap">
        <span class="rocket">🚀</span>
        <div class="exhaust"></div>
        <div class="exhaust"></div>
        <div class="exhaust"></div>
      </div>
      <div class="label">Launching Armada…</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
